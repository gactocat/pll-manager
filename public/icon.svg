<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Side stickers (top row = back face = blue) -->
  <rect x="144" y="48" width="64" height="64" rx="8" fill="#0000f0"/>
  <rect x="224" y="48" width="64" height="64" rx="8" fill="#0000f0"/>
  <rect x="304" y="48" width="64" height="64" rx="8" fill="#0000f0"/>
  <!-- Right column (right face = green) -->
  <rect x="400" y="144" width="64" height="64" rx="8" fill="#00d000"/>
  <rect x="400" y="224" width="64" height="64" rx="8" fill="#00d000"/>
  <rect x="400" y="304" width="64" height="64" rx="8" fill="#00d000"/>
  <!-- Bottom row (front face = red) -->
  <rect x="144" y="400" width="64" height="64" rx="8" fill="#e00000"/>
  <rect x="224" y="400" width="64" height="64" rx="8" fill="#e00000"/>
  <rect x="304" y="400" width="64" height="64" rx="8" fill="#e00000"/>
  <!-- Left column (left face = orange) -->
  <rect x="48" y="144" width="64" height="64" rx="8" fill="#f0a000"/>
  <rect x="48" y="224" width="64" height="64" rx="8" fill="#f0a000"/>
  <rect x="48" y="304" width="64" height="64" rx="8" fill="#f0a000"/>
  <!-- 3x3 U face (yellow) -->
  <rect x="144" y="144" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="224" y="144" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="304" y="144" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="144" y="224" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="224" y="224" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="304" y="224" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="144" y="304" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="224" y="304" width="64" height="64" rx="8" fill="#f0f000"/>
  <rect x="304" y="304" width="64" height="64" rx="8" fill="#f0f000"/>
</svg>
